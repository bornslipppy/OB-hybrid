name: PII commit guard

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Architecture D-8 / NFR-3: blocks any commit that touches raw note paths or
# matches PII filename patterns. This guard is active before any Epic 5 (Story 5.1)
# note-pull work begins — it is a prerequisite, not a nicety.
jobs:
  pii-guard:
    name: Block PII paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for committed PII patterns
        shell: bash
        env:
          # On PRs, diff against the merge base (covers every commit in the PR, not
          # just the tip). On pushes, diff against the prior pushed SHA. Fall back to
          # the empty tree so a brand-new branch still scans all files.
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          EMPTY_TREE=$(git hash-object -t tree /dev/null)
          if [[ -n "$BASE_SHA" && "$BASE_SHA" != "0000000000000000000000000000000000000000" ]] \
             && git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            RANGE="$BASE_SHA HEAD"
          else
            RANGE="$EMPTY_TREE HEAD"
          fi
          echo "PII guard diff range: $RANGE"
          CHANGED=$(git diff --name-only $RANGE)
          BLOCKED=0

          for f in $CHANGED; do
            # Blocked path prefixes (raw note directories).
            if [[ "$f" == h2/data/raw/* || "$f" == profiles/raw/* || "$f" == */data/raw/* ]]; then
              echo "❌  PII GUARD: blocked path committed: $f"
              BLOCKED=1
            fi
            # Blocked filename patterns (raw notes + PII spreadsheets / exports).
            if [[ "$f" == *.pii || "$f" == *.handover_raw.* || "$f" == *.handover.txt \
               || "$f" == */data/*.xlsx || "$f" == */data/*.xls || "$f" == */data/*.csv \
               || "$f" == *Notes-for-* || "$f" == *sales-notes* ]]; then
              echo "❌  PII GUARD: blocked filename pattern: $f"
              BLOCKED=1
            fi
          done

          if [[ $BLOCKED -eq 1 ]]; then
            echo ""
            echo "Raw (PII-bearing) handover notes must NEVER be committed to the repo"
            echo "(architecture D-8 / NFR-3). De-identify before any LLM or human touch."
            echo "See poc-eval-harness/.gitignore for the authoritative blocked patterns."
            exit 1
          fi
          echo "✅  PII guard: no blocked paths found."
